<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Nepal flag - unique double-pennant shape -->
  <defs>
    <clipPath id="flag">
      <polygon points="0,0 300,150 60,150 300,330 0,512"/>
    </clipPath>
  </defs>
  <!-- Blue border -->
  <polygon points="0,0 320,160 70,160 320,345 0,512" fill="#003893"/>
  <!-- Red body -->
  <polygon points="15,15 290,150 75,150 290,330 15,497" fill="#DC143C"/>
  <!-- Moon (upper triangle) -->
  <circle cx="130" cy="85" r="35" fill="white"/>
  <circle cx="130" cy="75" r="30" fill="#DC143C"/>
  <!-- Crescent rays -->
  <polygon points="130,50 125,30 135,30" fill="white"/>
  <polygon points="105,55 95,38 108,45" fill="white"/>
  <polygon points="155,55 165,38 152,45" fill="white"/>
  <polygon points="95,75 78,68 88,78" fill="white"/>
  <polygon points="165,75 182,68 172,78" fill="white"/>
  <!-- Sun (lower triangle) - 12 pointed star -->
  <circle cx="150" cy="280" r="28" fill="white"/>
  <polygon points="150,245 145,265 155,265" fill="white"/>
  <polygon points="150,315 145,295 155,295" fill="white"/>
  <polygon points="115,280 135,275 135,285" fill="white"/>
  <polygon points="185,280 165,275 165,285" fill="white"/>
  <polygon points="125,255 138,268 132,272" fill="white"/>
  <polygon points="175,305 162,292 168,288" fill="white"/>
  <polygon points="175,255 162,268 168,272" fill="white"/>
  <polygon points="125,305 138,292 132,288" fill="white"/>
</svg>
